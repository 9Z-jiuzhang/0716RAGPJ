# 前端静态站点 Nginx 配置
# guest -> /   admin -> /admin/   shared -> /assets/
# 说明：前后端均使用 Hash 路由，服务端只需正确提供静态文件

server {
    listen 80;
    server_name _;
    charset utf-8;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    # 后端 API：同 compose 网络内转发到 api 服务；不可达时前端会降级演示模式
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 600s;
    }

    # /admin 无尾斜杠时跳转，避免相对资源路径解析异常
    location = /admin {
        return 301 /admin/;
    }

    # 管理端 JS/CSS：缺失时返回 404，禁止回退成 HTML（否则 ES module 会 MIME 报错）
    location ^~ /admin/js/ {
        alias /usr/share/nginx/html/admin/js/;
        default_type application/javascript;
        add_header Cache-Control "no-cache";
    }

    location ^~ /admin/css/ {
        alias /usr/share/nginx/html/admin/css/;
        default_type text/css;
        add_header Cache-Control "no-cache";
    }

    # 管理端页面
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        index index.html;
        add_header Cache-Control "no-cache";
    }

    # 共享 CSS/JS（URL /assets/* -> shared/*）
    location /assets/ {
        alias /usr/share/nginx/html/shared/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # 访客端静态资源：禁止 try_files 回退到 index.html
    location ^~ /js/ {
        root /usr/share/nginx/html/guest;
        default_type application/javascript;
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    location ^~ /css/ {
        root /usr/share/nginx/html/guest;
        default_type text/css;
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    # /guest/* 不是对外路径（访客端已挂在 /），避免误请求拿到 HTML 触发 ES module MIME 错误
    location ^~ /guest/ {
        return 404;
    }

    # 访客端：站点根目录指向 guest
    location / {
        root /usr/share/nginx/html/guest;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
