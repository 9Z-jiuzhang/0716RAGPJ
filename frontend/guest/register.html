<!doctype html><html lang="zh-CN"><meta charset="utf-8"><title>注册</title><body><h1>用户注册</h1><input id="username" placeholder="用户名"><input id="email" placeholder="邮箱"><input id="nickname" placeholder="昵称"><input id="password" type="password" placeholder="至少 8 位密码"><button onclick="register()">注册</button><p id="message"></p><script>async function register(){const r=await fetch('/api/v1/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:username.value,email:email.value,nickname:nickname.value,password:password.value})});const b=await r.json();message.textContent=r.ok?'注册成功，请登录':b.detail}</script></body></html>
