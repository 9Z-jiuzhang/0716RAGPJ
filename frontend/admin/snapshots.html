<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>快照管理 - AI 知识库 RAG</title>
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">AI 知识库 RAG</div>
      <a href="index.html" data-page="dashboard">仪表盘</a>
      <a href="users.html" data-page="users">用户管理</a>
      <a href="roles.html" data-page="roles">角色管理</a>
      <a href="models.html" data-page="models">大模型管理</a>
      <a href="knowledge-bases.html" data-page="kb">知识库管理</a>
      <a href="snapshots.html" data-page="snapshots">快照管理</a>
      <a href="hit-test.html" data-page="hit">命中率测试</a>
      <a href="audit.html" data-page="audit">审计日志</a>
      <a href="monitor.html" data-page="monitor">系统监控</a>
    </aside>
    <main class="main">
      <h1 class="page-title">快照管理</h1>
      <p class="page-desc">对应产品手册 5.8：自动/手动快照、差异预览、选择性恢复与回退保护。</p>

      <div class="toolbar">
        <label>知识库 ID
          <input id="kbId" type="text" placeholder="UUID（可由 ?kb_id= 自动填入）" style="width:300px" />
        </label>
        <button id="btnLoad" type="button">刷新列表</button>
        <input id="snapName" type="text" placeholder="快照名称" />
        <button id="btnCreate" type="button">手动创建快照</button>
      </div>
      <p id="status" class="muted"></p>

      <table>
        <thead>
          <tr>
            <th>名称</th>
            <th>触发方式</th>
            <th>文档数</th>
            <th>分段数</th>
            <th>创建时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>

      <div id="previewPanel" class="panel" style="display:none">
        <h3>回退差异预览</h3>
        <p id="previewMeta" class="muted"></p>
        <div id="configChanges" class="muted" style="margin-bottom:8px"></div>
        <label style="display:block;margin-bottom:8px">
          <input type="checkbox" id="selectiveMode" /> 选择性恢复（仅勾选文档）
        </label>
        <table>
          <thead>
            <tr>
              <th><input type="checkbox" id="checkAll" title="全选变更项" /></th>
              <th>文档</th>
              <th>变更</th>
              <th>说明</th>
            </tr>
          </thead>
          <tbody id="previewBody"></tbody>
        </table>
        <div class="toolbar" style="margin-top:12px">
          <button id="btnRollback" type="button" class="danger">确认回退（将创建保护快照）</button>
          <button id="btnClosePreview" type="button" class="secondary">关闭</button>
        </div>
      </div>
    </main>
  </div>

  <script src="js/admin.js"></script>
  <script>
    AdminApp.highlightNav("snapshots");
    const params = new URLSearchParams(location.search);
    if (params.get("kb_id")) document.getElementById("kbId").value = params.get("kb_id");

    let previewSnapshotId = null;
    let previewDocs = [];

    function setStatus(msg, isError) {
      const el = document.getElementById("status");
      el.textContent = msg || "";
      el.className = isError ? "error" : "muted";
    }

    async function loadList() {
      const kbId = document.getElementById("kbId").value.trim();
      if (!kbId) return setStatus("请填写知识库 ID", true);
      setStatus("加载中…");
      try {
        const res = await AdminApp.api(`/knowledge-bases/${kbId}/snapshots`);
        const items = (res.data && res.data.items) || [];
        const tbody = document.getElementById("tbody");
        tbody.innerHTML = items.map((s) => `
          <tr>
            <td>${s.name}</td>
            <td><span class="badge">${s.trigger}</span></td>
            <td>${s.document_count}</td>
            <td>${s.total_chunks}</td>
            <td>${s.created_at || ""}</td>
            <td>
              <button type="button" data-act="detail" data-id="${s.id}">详情</button>
              <button type="button" data-act="preview" data-id="${s.id}">差异预览</button>
              <button type="button" class="danger" data-act="delete" data-id="${s.id}">删除</button>
            </td>
          </tr>
        `).join("") || `<tr><td colspan="6" class="muted">暂无快照</td></tr>`;
        setStatus(`共 ${res.data.total || 0} 条`);
      } catch (e) {
        setStatus(e.message, true);
      }
    }

    document.getElementById("btnLoad").onclick = loadList;

    document.getElementById("btnCreate").onclick = async () => {
      const kbId = document.getElementById("kbId").value.trim();
      const name = document.getElementById("snapName").value.trim() || `手动快照-${Date.now()}`;
      if (!kbId) return setStatus("请填写知识库 ID", true);
      try {
        await AdminApp.api(`/knowledge-bases/${kbId}/snapshots`, {
          method: "POST",
          body: JSON.stringify({ name, description: "管理员手动创建" }),
        });
        setStatus("快照已创建");
        loadList();
      } catch (e) {
        setStatus(e.message, true);
      }
    };

    function renderPreview(data) {
      previewDocs = data.affected_documents || [];
      document.getElementById("previewPanel").style.display = "block";
      document.getElementById("previewMeta").textContent =
        `快照「${data.snapshot_name}」· 文档变更 ${data.total_changes} 项 · 回退后需重建索引`;
      const cfg = (data.config_changes || [])
        .map((c) => `${c.field}: ${JSON.stringify(c.current)} → ${JSON.stringify(c.snapshot)}`)
        .join("； ");
      document.getElementById("configChanges").textContent = cfg ? `配置差异：${cfg}` : "配置无差异";
      document.getElementById("previewBody").innerHTML = previewDocs.map((d) => `
        <tr>
          <td><input type="checkbox" class="doc-check" value="${d.document_id}" ${d.change_type === "unchanged" ? "" : "checked"} /></td>
          <td>${d.filename}</td>
          <td><span class="badge ${d.change_type}">${d.change_type}</span></td>
          <td>${d.detail || ""}</td>
        </tr>
      `).join("");
    }

    document.getElementById("tbody").onclick = async (ev) => {
      const btn = ev.target.closest("button[data-act]");
      if (!btn) return;
      const kbId = document.getElementById("kbId").value.trim();
      const id = btn.dataset.id;
      const act = btn.dataset.act;
      try {
        if (act === "delete") {
          if (!confirm("确认删除该快照？")) return;
          await AdminApp.api(`/knowledge-bases/${kbId}/snapshots/${id}`, { method: "DELETE" });
          loadList();
        } else if (act === "detail") {
          const res = await AdminApp.api(`/knowledge-bases/${kbId}/snapshots/${id}`);
          alert(JSON.stringify(res.data, null, 2));
        } else if (act === "preview") {
          const res = await AdminApp.api(`/knowledge-bases/${kbId}/snapshots/${id}/preview`, { method: "POST" });
          previewSnapshotId = id;
          renderPreview(res.data);
        }
      } catch (e) {
        setStatus(e.message, true);
      }
    };

    document.getElementById("checkAll").onchange = (ev) => {
      document.querySelectorAll(".doc-check").forEach((c) => { c.checked = ev.target.checked; });
    };

    document.getElementById("btnClosePreview").onclick = () => {
      document.getElementById("previewPanel").style.display = "none";
      previewSnapshotId = null;
    };

    document.getElementById("btnRollback").onclick = async () => {
      const kbId = document.getElementById("kbId").value.trim();
      if (!previewSnapshotId) return;
      if (!confirm("确认回退？将创建保护快照；索引需重建后才会激活。")) return;

      const payload = { confirm: true };
      if (document.getElementById("selectiveMode").checked) {
        const ids = [...document.querySelectorAll(".doc-check:checked")].map((c) => c.value);
        if (!ids.length) return setStatus("选择性恢复请至少勾选一个文档", true);
        payload.document_ids = ids;
      }

      try {
        const res = await AdminApp.api(
          `/knowledge-bases/${kbId}/snapshots/${previewSnapshotId}/rollback`,
          { method: "POST", body: JSON.stringify(payload) }
        );
        setStatus(res.data.message || "回退成功");
        document.getElementById("previewPanel").style.display = "none";
        loadList();
      } catch (e) {
        setStatus(e.message, true);
      }
    };

    if (document.getElementById("kbId").value) loadList();
  </script>
</body>
</html>
