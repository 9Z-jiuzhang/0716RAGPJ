# Prometheus 采集配置
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # Prometheus 自身
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # FastAPI 应用指标（后端实现 /metrics 后生效）
  - job_name: "api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
