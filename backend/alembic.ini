# Alembic 配置（工作目录为 backend/，与 Dockerfile WORKDIR 对齐）
# 用法：cd backend && alembic upgrade head

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# 实际 URL 由 env.py 从 Settings 动态注入，此处仅作占位
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
