limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

resolver 127.0.0.11 valid=30s;

server {
    listen 8080;
    server_name _;
    client_max_body_size 100m;

    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;
        set $api_upstream api:8000;
        proxy_pass http://$api_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 600s;
        proxy_buffering off;
        proxy_cache off;
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
    }

    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        set $api_upstream api:8000;
        proxy_pass http://$api_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $request_id;
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
    }

    location /docs {
        set $api_upstream api:8000;
        proxy_pass http://$api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /docs;
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
    }

    location /redoc {
        set $api_upstream api:8000;
        proxy_pass http://$api_upstream;
        proxy_set_header Host $host;
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
    }

    location /openapi.json {
        set $api_upstream api:8000;
        proxy_pass http://$api_upstream/openapi.json;
        proxy_set_header Host $host;
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
    }

    # Swagger / ReDoc 静态与 oauth 回调
    location /docs/ {
        set $api_upstream api:8000;
        proxy_pass http://$api_upstream/docs/;
        proxy_set_header Host $host;
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
    }

    location /redoc/ {
        set $api_upstream api:8000;
        proxy_pass http://$api_upstream/redoc/;
        proxy_set_header Host $host;
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
    }

    location /grafana/ {
        # 使用变量 + resolver，避免 grafana 未启动时 nginx 无法启动
        set $grafana_upstream grafana:3000;
        proxy_pass http://$grafana_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
    }

    location / {
        set $web_upstream web:80;
        proxy_pass http://$web_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
    }
}
