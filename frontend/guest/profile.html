<!doctype html><html lang="zh-CN"><meta charset="utf-8"><title>个人中心</title><body><h1>个人中心</h1><pre id="profile"></pre><button onclick="logout()">退出登录</button><script>async function load(){const r=await fetch('/api/v1/auth/me',{headers:{Authorization:'Bearer '+localStorage.access_token}});if(!r.ok)return location.href='login.html';profile.textContent=JSON.stringify(await r.json(),null,2)}function logout(){localStorage.clear();location.href='login.html'}load()</script></body></html>
