# AI 知识库 RAG 平台 — Docker Compose 编排
# 说明：包含智能问答模块（5.6）所需的基础设施：PostgreSQL、Redis、Chroma、MinIO

services:
  # ---------- FastAPI 后端 ----------
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    # 本地开发：热重载 + 源码挂载（云端请用 docker-compose.prod.yml 覆盖）
    entrypoint: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    command: ["--reload"]
    ports:
      # 8000 落在本机 Hyper-V 排除段(7940-8039)，改映射 18000；容器内仍为 8000
      - "18000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_started
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - kb-network

  # ---------- 前端静态文件（Nginx） ----------
  web:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_started
    networks:
      - kb-network

  # ---------- PostgreSQL ----------
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-knowledge_base}
      POSTGRES_USER: ${POSTGRES_USER:-kb_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请在 .env 中设置 POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kb-network

  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    ports:
      # Windows 排除区含 6379（6367-6466）；宿主机映射 16379，容器内仍 6379
      - "16379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kb-network

  # ---------- Chroma 向量库 ----------
  chroma:
    # 需与 API 内 chromadb>=1.0 匹配；0.6 客户端对接新服务端会报 KeyError: '_type'
    image: chromadb/chroma:latest
    ports:
      # 8001 落在本机 Hyper-V 排除段(7940-8039)，改映射 18001；容器内仍为 8000
      - "18001:8000"
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
      CHROMA_SERVER_HOST: "0.0.0.0"
      CHROMA_SERVER_HTTP_PORT: "8000"
    volumes:
      - ./data/chroma:/chroma/chroma
    healthcheck:
      disable: true
    networks:
      - kb-network

  # ---------- MinIO 对象存储 ----------
  minio:
    image: minio/minio:latest
    ports:
      # 主机 9000 常被 milvus-minio 占用，改映射避免无法启动
      - "19000:9000"
      - "19001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?请在 .env 中设置 MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?请在 .env 中设置 MINIO_SECRET_KEY}
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - kb-network

  # ---------- Prometheus ----------
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    networks:
      - kb-network

  # ---------- Grafana ----------
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SERVER_ROOT_URL: ${PUBLIC_BASE_URL:-http://localhost:18080}/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?请填写}
      GF_USERS_DEFAULT_THEME: light
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SECURITY_COOKIE_SAMESITE: lax
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - kb-network

  # ---------- 统一入口反向代理 ----------
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      # 8080 落在本机 Hyper-V 排除段(8040-8139)，改映射 18080
      - "18080:8080"
    volumes:
      - ./docker/nginx/reverse-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_started
      grafana:
        condition: service_started
    networks:
      - kb-network

networks:
  kb-network:
    driver: bridge
