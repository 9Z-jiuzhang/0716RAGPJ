<!doctype html><html lang="zh-CN"><meta charset="utf-8"><title>登录</title><body><h1>登录</h1><input id="username" placeholder="用户名"><input id="password" type="password" placeholder="密码"><button onclick="login()">登录</button><a href="register.html">注册</a><p id="message"></p><script>async function login(){const r=await fetch('/api/v1/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:username.value,password:password.value})});const b=await r.json();if(!r.ok)return message.textContent=b.detail;localStorage.setItem('access_token',b.access_token);localStorage.setItem('refresh_token',b.refresh_token);location.href='profile.html'}</script></body></html>
