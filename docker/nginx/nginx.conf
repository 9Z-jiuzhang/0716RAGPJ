# 前端静态站点 Nginx 配置
# guest -> /   admin -> /admin/   shared -> /assets/
# 说明：前后端均使用 Hash 路由，服务端只需正确提供静态文件

server {
    listen 80;
    server_name _;
    charset utf-8;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    # 后端 API：同 compose 网络内转发到 api 服务；不可达时前端会降级演示模式
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 600s;
    }

    # 访客端：站点根目录指向 guest
    location / {
        root /usr/share/nginx/html/guest;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # /admin 无尾斜杠时跳转，避免 alias 匹配异常
    location = /admin {
        return 301 /admin/;
    }

    # 管理端静态资源目录
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        index index.html;
        add_header Cache-Control "no-cache";
    }

    # 共享 CSS/JS（URL /assets/* -> shared/*）
    location /assets/ {
        alias /usr/share/nginx/html/shared/;
        expires 7d;
        add_header Cache-Control "public";
    }
}
