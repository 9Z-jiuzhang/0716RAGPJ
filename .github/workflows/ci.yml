# GitHub Actions CI
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kb_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: knowledge_base_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kb_user -d knowledge_base_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check backend || true
        # 框架阶段允许空目录；业务代码落地后去掉 || true

      - name: Black check
        run: black --check backend || true

      - name: Pytest
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_DB: knowledge_base_test
          POSTGRES_USER: kb_user
          POSTGRES_PASSWORD: test_password
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
        run: |
          if [ -d backend/tests ] && [ "$(find backend/tests -name 'test_*.py' | wc -l)" -gt 0 ]; then
            pytest backend/tests -v
          else
            echo "暂无测试用例，跳过 pytest"
          fi
