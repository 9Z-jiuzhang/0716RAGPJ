<!doctype html><html lang="zh-CN"><meta charset="utf-8"><title>用户管理</title><body><h1>用户管理</h1><table border="1"><thead><tr><th>账号</th><th>昵称</th><th>状态</th><th>角色</th><th>创建时间</th><th>最近登录</th><th>操作</th></tr></thead><tbody id="rows"></tbody></table><script>const token=localStorage.access_token;async function api(path,opt={}){opt.headers={...(opt.headers||{}),Authorization:'Bearer '+token,'Content-Type':'application/json'};const r=await fetch('/api/v1'+path,opt);if(!r.ok)throw new Error((await r.json()).detail);return r.json()}async function load(){try{const users=await api('/users');rows.innerHTML=users.map(u=>`<tr><td>${u.username}</td><td>${u.nickname||''}</td><td>${u.status}</td><td>${u.roles.join('、')}</td><td>${u.created_at}</td><td>${u.last_login_at||''}</td><td><button onclick="toggle('${u.id}','${u.status}')">${u.status==='active'?'禁用':'启用'}</button></td></tr>`).join('')}catch(e){alert(e.message)}}async function toggle(id,status){await api('/users/'+id+'/status',{method:'PATCH',body:JSON.stringify({status:status==='active'?'disabled':'active'})});load()}load()</script></body></html>
