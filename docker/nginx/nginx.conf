# 前端静态站点 Nginx 配置
# guest -> /   admin -> /admin/   shared -> /assets/
# 说明：前后端均使用 Hash 路由，服务端只需正确提供静态文件

server {
    listen 80;
    server_name _;
    charset utf-8;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    # 后端 API：前端独立 compose 无 api 服务时返回 501，由前端降级演示模式
    # 避免 POST 落到静态 location 产生 HTTP 405
    location /api/ {
        default_type application/json;
        return 501 '{"code":501,"message":"API backend not available in frontend-only mode"}';
    }

    # 访客端：站点根目录指向 guest
    location / {
        root /usr/share/nginx/html/guest;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # /admin 无尾斜杠时跳转，避免 alias 匹配异常
    location = /admin {
        return 301 /admin/;
    }

    # 管理端静态资源目录
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        index index.html;
        add_header Cache-Control "no-cache";
    }

    # 共享 CSS/JS（URL /assets/* -> shared/*）
    location /assets/ {
        alias /usr/share/nginx/html/shared/;
        expires 7d;
        add_header Cache-Control "public";
    }
}
