<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 知识库 · 访客端</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem("kb-theme") || "dark";
        document.documentElement.setAttribute("data-theme", t === "light" ? "light" : "dark");
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/variables.css?v=bug-ui-palette-0721ff" />
  <link rel="stylesheet" href="/assets/css/base.css?v=bug-ui-palette-0721ff" />
  <link rel="stylesheet" href="/assets/css/components.css?v=bug-ui-palette-0721ff" />
  <link rel="stylesheet" href="/assets/css/layout.css?v=bug-ui-palette-0721ff" />
  <link rel="stylesheet" href="/assets/css/motion.css?v=bug-ui-palette-0721ff" />
  <!-- 使用绝对路径，避免无尾斜杠 URL 下相对路径解析到错误目录 -->
  <link rel="stylesheet" href="/css/guest.css?v=bug-ui-palette-0721ff" />
</head>
<body>
  <div class="mesh-atmosphere" aria-hidden="true">
    <div class="mesh-atmosphere-canvas"></div>
    <div class="mesh-blob mesh-blob-tr"></div>
    <div class="mesh-blob mesh-blob-bl"></div>
    <div class="mesh-noise"></div>
  </div>
  <div id="app"></div>
  <script>
    (function () {
      var timers = new WeakMap();
      function markScrolling(target) {
        var el =
          !target || target === document || target === document.documentElement || target === document.body
            ? document.documentElement
            : target;
        if (!el || !el.classList) return;
        el.classList.add("is-scrolling");
        var prev = timers.get(el);
        if (prev) clearTimeout(prev);
        timers.set(
          el,
          setTimeout(function () {
            el.classList.remove("is-scrolling");
          }, 900)
        );
      }
      document.addEventListener(
        "scroll",
        function (e) {
          markScrolling(e.target === document ? document.documentElement : e.target);
        },
        true
      );
    })();
  </script>
  <script type="module" src="/js/app.js?v=bug-ui-palette-0721ff"></script>
</body>
</html>
